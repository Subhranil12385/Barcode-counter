<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ScanCount</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/zxing-js/0.20.0/index.min.js"></script>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --card: #1c1c28;
    --accent: #00e5ff;
    --accent2: #ff3d71;
    --accent3: #00ff94;
    --text: #f0f0ff;
    --muted: #6b6b8a;
    --border: rgba(255,255,255,0.07);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Courier New', monospace;
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    user-select: none;
  }

  /* HEADER */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px 8px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    z-index: 10;
    flex-shrink: 0;
  }

  .logo {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--accent);
    text-transform: uppercase;
  }

  .logo span { color: var(--text); }

  /* MODE TOGGLE */
  .mode-toggle {
    display: flex;
    background: var(--card);
    border-radius: 8px;
    padding: 3px;
    gap: 2px;
    border: 1px solid var(--border);
  }

  .mode-btn {
    padding: 5px 14px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
    background: transparent;
    color: var(--muted);
  }

  .mode-btn.active {
    background: var(--accent);
    color: #000;
  }

  .mode-btn.active.diff { background: var(--accent3); }

  /* CAMERA */
  .cam-wrap {
    position: relative;
    flex: 1;
    overflow: hidden;
    background: #000;
  }

  #video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* SCAN OVERLAY */
  .scan-overlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  .scan-line {
    position: absolute;
    left: 10%;
    right: 10%;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    box-shadow: 0 0 12px var(--accent);
    animation: scanline 2s linear infinite;
    top: 20%;
  }

  @keyframes scanline {
    0% { top: 20%; opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { top: 80%; opacity: 0; }
  }

  /* Corner brackets */
  .corner {
    position: absolute;
    width: 28px;
    height: 28px;
    border-color: var(--accent);
    border-style: solid;
    opacity: 0.8;
  }
  .corner.tl { top: 18%; left: 8%; border-width: 3px 0 0 3px; }
  .corner.tr { top: 18%; right: 8%; border-width: 3px 3px 0 0; }
  .corner.bl { bottom: 30%; left: 8%; border-width: 0 0 3px 3px; }
  .corner.br { bottom: 30%; right: 8%; border-width: 0 3px 3px 0; }

  /* Flash on scan */
  .flash-anim {
    position: absolute;
    inset: 0;
    background: rgba(0, 229, 255, 0.15);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.05s;
  }
  .flash-anim.show { opacity: 1; }

  /* Zoom control */
  .zoom-ctrl {
    position: absolute;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    border-radius: 30px;
    padding: 6px 14px;
    border: 1px solid var(--border);
    pointer-events: all;
  }

  .zoom-label {
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 1px;
    min-width: 36px;
    text-align: center;
  }

  .zoom-slider {
    -webkit-appearance: none;
    width: 120px;
    height: 3px;
    border-radius: 2px;
    background: rgba(255,255,255,0.2);
    outline: none;
  }
  .zoom-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    cursor: pointer;
  }

  /* Torch & controls */
  .cam-controls {
    position: absolute;
    top: 12px;
    right: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    pointer-events: all;
  }

  .ctrl-btn {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(10px);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 18px;
    color: var(--text);
    transition: all 0.2s;
    pointer-events: all;
  }
  .ctrl-btn.on { border-color: var(--accent); color: var(--accent); background: rgba(0,229,255,0.1); }
  .ctrl-btn:active { transform: scale(0.9); }

  /* COUNT DISPLAY */
  .count-section {
    flex-shrink: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 10px 16px;
  }

  .count-main {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .count-number {
    font-size: 52px;
    font-weight: 900;
    line-height: 1;
    color: var(--accent);
    letter-spacing: -2px;
    text-shadow: 0 0 30px rgba(0,229,255,0.4);
    transition: all 0.1s;
  }

  .count-number.bump {
    transform: scale(1.15);
    color: #fff;
  }

  .count-number.diff-mode { color: var(--accent3); text-shadow: 0 0 30px rgba(0,255,148,0.4); }

  .count-info {
    text-align: right;
  }

  .count-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .count-mode-badge {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: var(--accent);
    text-transform: uppercase;
    padding: 2px 8px;
    background: rgba(0,229,255,0.1);
    border-radius: 4px;
    border: 1px solid rgba(0,229,255,0.3);
    margin-top: 4px;
    display: inline-block;
  }

  .count-mode-badge.diff-mode {
    color: var(--accent3);
    background: rgba(0,255,148,0.1);
    border-color: rgba(0,255,148,0.3);
  }

  /* Target barcode (same mode) */
  .target-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
    min-height: 28px;
  }

  .target-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    flex-shrink: 0;
  }

  .target-code {
    font-size: 12px;
    color: var(--accent);
    background: rgba(0,229,255,0.08);
    border: 1px solid rgba(0,229,255,0.2);
    border-radius: 4px;
    padding: 3px 8px;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    min-height: 24px;
  }

  .target-clear {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: rgba(255,61,113,0.15);
    border: 1px solid rgba(255,61,113,0.3);
    color: var(--accent2);
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
  }

  /* Bottom actions */
  .bottom-row {
    display: flex;
    gap: 8px;
  }

  .action-btn {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: none;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Courier New', monospace;
  }
  .action-btn:active { transform: scale(0.97); }

  .btn-reset {
    background: rgba(255,61,113,0.15);
    color: var(--accent2);
    border: 1px solid rgba(255,61,113,0.3);
  }

  .btn-list {
    background: rgba(255,255,255,0.06);
    color: var(--text);
    border: 1px solid var(--border);
  }

  /* ITEMS LIST SHEET */
  .sheet {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    flex-direction: column;
    background: var(--bg);
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
  }

  .sheet.open { transform: translateY(0); }

  .sheet-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 16px 12px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .sheet-title {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
  }

  .sheet-close {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  .sheet-body {
    flex: 1;
    overflow-y: auto;
    padding: 8px 12px;
  }

  .item-row {
    display: flex;
    align-items: center;
    padding: 10px 12px;
    background: var(--card);
    border-radius: 8px;
    margin-bottom: 6px;
    border: 1px solid var(--border);
    gap: 10px;
    animation: slideIn 0.2s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-10px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .item-code {
    flex: 1;
    font-size: 13px;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .item-count {
    font-size: 20px;
    font-weight: 900;
    color: var(--accent3);
    min-width: 36px;
    text-align: right;
  }

  .item-bar {
    height: 3px;
    background: linear-gradient(90deg, var(--accent3), transparent);
    border-radius: 2px;
    margin-top: 4px;
    transition: width 0.3s;
  }

  .no-items {
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    padding: 40px 20px;
    letter-spacing: 1px;
  }

  /* Status bar */
  .status-bar {
    position: absolute;
    top: 10px;
    left: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 4px 10px;
    pointer-events: none;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--accent3);
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .status-text {
    font-size: 10px;
    color: rgba(255,255,255,0.7);
    letter-spacing: 1px;
  }

  /* Scan flash badges */
  .badge-container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    justify-content: center;
    max-width: 90%;
  }

  .scan-badge {
    background: rgba(0,0,0,0.8);
    border: 1.5px solid var(--accent);
    color: var(--accent);
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 4px;
    font-weight: 700;
    animation: badgePop 0.8s forwards;
    max-width: 200px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  @keyframes badgePop {
    0% { opacity: 0; transform: scale(0.8); }
    20% { opacity: 1; transform: scale(1.05); }
    70% { opacity: 1; }
    100% { opacity: 0; transform: translateY(-20px) scale(0.9); }
  }

  /* Tap focus ring */
  .focus-ring {
    position: absolute;
    width: 60px;
    height: 60px;
    border: 2px solid var(--accent);
    border-radius: 50%;
    pointer-events: none;
    transform: translate(-50%, -50%);
    animation: focusAnim 0.6s forwards;
    display: none;
  }

  @keyframes focusAnim {
    0% { opacity: 1; transform: translate(-50%, -50%) scale(1.3); }
    60% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(0.95); }
  }

  /* No camera msg */
  .no-cam {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--muted);
    font-size: 13px;
    letter-spacing: 1px;
    background: #000;
  }

  .no-cam svg { opacity: 0.4; }

  .start-btn {
    padding: 12px 28px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    font-family: 'Courier New', monospace;
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">SCAN<span>COUNT</span></div>
  <div class="mode-toggle">
    <button class="mode-btn active" id="btnSame" onclick="setMode('same')">SAME</button>
    <button class="mode-btn diff" id="btnDiff" onclick="setMode('diff')">DIFF</button>
  </div>
</div>

<!-- CAMERA -->
<div class="cam-wrap" id="camWrap">
  <video id="video" playsinline muted autoplay></video>

  <div class="scan-overlay">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
    <div class="scan-line" id="scanLine"></div>
  </div>

  <div class="flash-anim" id="flashAnim"></div>

  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <div class="status-text" id="statusText">SCANNING</div>
  </div>

  <div class="cam-controls">
    <div class="ctrl-btn" id="torchBtn" onclick="toggleTorch()" title="Flash">🔦</div>
    <div class="ctrl-btn" id="camSwitch" onclick="switchCamera()" title="Switch Camera">🔄</div>
  </div>

  <div class="badge-container" id="badgeContainer"></div>
  <div class="focus-ring" id="focusRing"></div>

  <div class="zoom-ctrl">
    <span class="zoom-label" id="zoomLabel">1.0×</span>
    <input type="range" class="zoom-slider" id="zoomSlider" min="1" max="5" step="0.1" value="1" oninput="applyZoom(this.value)">
  </div>

  <div class="no-cam" id="noCam" style="display:none">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
      <circle cx="12" cy="13" r="4"/>
    </svg>
    <span>Camera not started</span>
    <button class="start-btn" onclick="startCamera()">START CAMERA</button>
  </div>
</div>

<!-- COUNT SECTION -->
<div class="count-section">
  <div class="count-main">
    <div class="count-number" id="countNum">0</div>
    <div class="count-info">
      <div class="count-label" id="countLabel">ITEMS SCANNED</div>
      <div class="count-mode-badge" id="modeBadge">SAME MODE</div>
    </div>
  </div>

  <div class="target-row" id="targetRow">
    <span class="target-label">TARGET:</span>
    <div class="target-code" id="targetCode">Scan first barcode to set target</div>
    <div class="target-clear" onclick="clearTarget()" id="clearBtn" style="display:none">×</div>
  </div>

  <div class="bottom-row">
    <button class="action-btn btn-reset" onclick="resetAll()">↺ RESET</button>
    <button class="action-btn btn-list" onclick="openSheet()">☰ DETAILS</button>
  </div>
</div>

<!-- DETAILS SHEET -->
<div class="sheet" id="sheet">
  <div class="sheet-header">
    <span class="sheet-title" id="sheetTitle">SCAN LOG</span>
    <div class="sheet-close" onclick="closeSheet()">×</div>
  </div>
  <div class="sheet-body" id="sheetBody">
    <div class="no-items">No scans yet</div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────
let mode = 'same';
let targetCode = null;
let sameCount = 0;
let diffMap = {};     // code → count
let stream = null;
let torchOn = false;
let track = null;
let facingMode = 'environment';
let codeReader = null;
let scanning = false;
let lastScanned = {};     // throttle per-code
let badgeTimers = {};
const THROTTLE_MS = 1500; // ms between counting same code

// ── Mode ───────────────────────────────────────────────────────
function setMode(m) {
  mode = m;
  resetAll();
  document.getElementById('btnSame').classList.toggle('active', m === 'same');
  document.getElementById('btnDiff').classList.toggle('active', m === 'diff');
  document.getElementById('targetRow').style.display = m === 'same' ? 'flex' : 'none';
  const badge = document.getElementById('modeBadge');
  const num = document.getElementById('countNum');
  badge.textContent = m === 'same' ? 'SAME MODE' : 'DIFF MODE';
  badge.classList.toggle('diff-mode', m === 'diff');
  num.classList.toggle('diff-mode', m === 'diff');
  document.getElementById('countLabel').textContent = m === 'same' ? 'ITEMS SCANNED' : 'UNIQUE CODES';
}

// ── Count update ───────────────────────────────────────────────
function updateCount() {
  const el = document.getElementById('countNum');
  const val = mode === 'same' ? sameCount : Object.keys(diffMap).length;
  el.textContent = val;
  el.classList.add('bump');
  setTimeout(() => el.classList.remove('bump'), 120);
}

// ── Handle detected codes ──────────────────────────────────────
function handleCodes(codes) {
  if (!codes || codes.length === 0) return;
  let anyNew = false;
  const now = Date.now();

  codes.forEach(code => {
    const text = code.rawValue || code.text || (typeof code === 'string' ? code : null);
    if (!text) return;

    const last = lastScanned[text] || 0;
    if (now - last < THROTTLE_MS) return;
    lastScanned[text] = now;

    if (mode === 'same') {
      if (!targetCode) {
        targetCode = text;
        document.getElementById('targetCode').textContent = text;
        document.getElementById('clearBtn').style.display = 'flex';
      }
      if (text === targetCode) {
        sameCount++;
        anyNew = true;
        showBadge(text);
      }
    } else {
      diffMap[text] = (diffMap[text] || 0) + 1;
      anyNew = true;
      showBadge(text);
    }
  });

  if (anyNew) {
    updateCount();
    doFlash();
    renderSheet();
  }
}

// ── Visual feedback ────────────────────────────────────────────
function doFlash() {
  const f = document.getElementById('flashAnim');
  f.classList.add('show');
  setTimeout(() => f.classList.remove('show'), 80);
}

function showBadge(text) {
  const container = document.getElementById('badgeContainer');
  const badge = document.createElement('div');
  badge.className = 'scan-badge';
  badge.textContent = text.length > 24 ? text.slice(0, 24) + '…' : text;
  container.appendChild(badge);
  setTimeout(() => badge.remove(), 800);
}

// ── Camera ─────────────────────────────────────────────────────
async function startCamera() {
  document.getElementById('noCam').style.display = 'none';
  document.getElementById('statusText').textContent = 'STARTING';

  try {
    if (stream) { stream.getTracks().forEach(t => t.stop()); }

    stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode,
        width: { ideal: 1920 },
        height: { ideal: 1080 }
      }
    });

    const video = document.getElementById('video');
    video.srcObject = stream;
    track = stream.getVideoTracks()[0];

    // Set up zoom range from capabilities
    const caps = track.getCapabilities ? track.getCapabilities() : {};
    if (caps.zoom) {
      const slider = document.getElementById('zoomSlider');
      slider.min = caps.zoom.min;
      slider.max = caps.zoom.max;
      slider.step = caps.zoom.step || 0.1;
      slider.value = caps.zoom.min;
    }

    await video.play();
    document.getElementById('statusText').textContent = 'SCANNING';
    startZxing();
  } catch(e) {
    console.error(e);
    document.getElementById('noCam').style.display = 'flex';
    document.getElementById('statusText').textContent = 'ERROR';
  }
}

// ── ZXing multi-barcode scanning ───────────────────────────────
let animFrame = null;
let canvas, ctx;

function startZxing() {
  if (scanning) return;
  scanning = true;

  canvas = document.createElement('canvas');
  ctx = canvas.getContext('2d');

  // Use ZXing browser multi-format reader
  const hints = new Map();
  hints.set(ZXing.DecodeHintType.TRY_HARDER, true);

  const reader = new ZXing.MultiFormatReader();
  reader.setHints(hints);

  const multiReader = new ZXing.GenericMultipleBarcodeReader(reader);

  function tick() {
    if (!scanning) return;
    const video = document.getElementById('video');
    if (video.readyState === video.HAVE_ENOUGH_DATA) {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0);
      try {
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const luminance = new ZXing.RGBLuminanceSource(imageData.data, canvas.width, canvas.height);
        const bitmap = new ZXing.BinaryBitmap(new ZXing.HybridBinarizer(luminance));
        try {
          const results = multiReader.decodeMultiple(bitmap);
          if (results && results.length > 0) {
            handleCodes(results.map(r => ({ rawValue: r.getText(), text: r.getText() })));
          }
        } catch(e2) {
          // No codes found this frame — normal
        }
      } catch(e) {}
    }
    animFrame = requestAnimationFrame(tick);
  }
  tick();
}

function stopZxing() {
  scanning = false;
  if (animFrame) cancelAnimationFrame(animFrame);
}

// ── Torch ──────────────────────────────────────────────────────
async function toggleTorch() {
  if (!track) return;
  torchOn = !torchOn;
  try {
    await track.applyConstraints({ advanced: [{ torch: torchOn }] });
    document.getElementById('torchBtn').classList.toggle('on', torchOn);
  } catch(e) {
    torchOn = false;
    alert('Torch not supported on this device');
  }
}

// ── Zoom ───────────────────────────────────────────────────────
async function applyZoom(val) {
  const v = parseFloat(val);
  document.getElementById('zoomLabel').textContent = v.toFixed(1) + '×';
  if (!track) return;
  try {
    await track.applyConstraints({ advanced: [{ zoom: v }] });
  } catch(e) {}
}

// ── Switch camera ──────────────────────────────────────────────
async function switchCamera() {
  facingMode = facingMode === 'environment' ? 'user' : 'environment';
  stopZxing();
  await startCamera();
}

// ── Tap to focus ───────────────────────────────────────────────
document.getElementById('camWrap').addEventListener('click', async (e) => {
  if (e.target.closest('.ctrl-btn') || e.target.closest('.zoom-ctrl')) return;
  const ring = document.getElementById('focusRing');
  ring.style.left = e.clientX + 'px';
  ring.style.top = (e.clientY) + 'px';
  ring.style.display = 'block';
  ring.style.animation = 'none';
  ring.offsetHeight;
  ring.style.animation = 'focusAnim 0.6s forwards';
  setTimeout(() => ring.style.display = 'none', 650);

  if (track) {
    try {
      const caps = track.getCapabilities ? track.getCapabilities() : {};
      if (caps.focusMode && caps.focusMode.includes('manual')) {
        const rect = document.getElementById('camWrap').getBoundingClientRect();
        const x = (e.clientX - rect.left) / rect.width;
        const y = (e.clientY - rect.top) / rect.height;
        await track.applyConstraints({ advanced: [{ focusMode: 'manual', pointsOfInterest: [{ x, y }] }] });
      }
    } catch(e2) {}
  }
});

// ── Clear target ───────────────────────────────────────────────
function clearTarget() {
  targetCode = null;
  sameCount = 0;
  lastScanned = {};
  document.getElementById('targetCode').textContent = 'Scan first barcode to set target';
  document.getElementById('clearBtn').style.display = 'none';
  updateCount();
  renderSheet();
}

// ── Reset ──────────────────────────────────────────────────────
function resetAll() {
  sameCount = 0;
  diffMap = {};
  targetCode = null;
  lastScanned = {};
  document.getElementById('targetCode').textContent = 'Scan first barcode to set target';
  document.getElementById('clearBtn').style.display = 'none';
  document.getElementById('countNum').textContent = '0';
  renderSheet();
}

// ── Details sheet ──────────────────────────────────────────────
function openSheet() {
  renderSheet();
  document.getElementById('sheet').classList.add('open');
}
function closeSheet() {
  document.getElementById('sheet').classList.remove('open');
}

function renderSheet() {
  const body = document.getElementById('sheetBody');
  if (mode === 'same') {
    document.getElementById('sheetTitle').textContent = 'TARGET COUNT';
    if (!targetCode) {
      body.innerHTML = '<div class="no-items">No target set yet</div>';
      return;
    }
    const maxCount = Math.max(sameCount, 1);
    body.innerHTML = `
      <div class="item-row">
        <div style="flex:1">
          <div class="item-code">${targetCode}</div>
          <div class="item-bar" style="width:100%"></div>
        </div>
        <div class="item-count">${sameCount}</div>
      </div>`;
  } else {
    document.getElementById('sheetTitle').textContent = 'ALL BARCODES';
    const entries = Object.entries(diffMap).sort((a,b) => b[1] - a[1]);
    if (entries.length === 0) {
      body.innerHTML = '<div class="no-items">No scans yet</div>';
      return;
    }
    const maxCount = Math.max(...entries.map(e => e[1]));
    body.innerHTML = entries.map(([code, count]) => `
      <div class="item-row">
        <div style="flex:1;overflow:hidden">
          <div class="item-code">${code}</div>
          <div class="item-bar" style="width:${Math.round(count/maxCount*100)}%"></div>
        </div>
        <div class="item-count">${count}</div>
      </div>`).join('');
  }
}

// ── Init ───────────────────────────────────────────────────────
window.addEventListener('load', () => {
  startCamera();
});

// Keep camera awake
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && !scanning) startCamera();
});
</script>
</body>
</html>
